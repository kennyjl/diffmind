    <title>DiffMind - 一次提问！多个AI一起回答</title>
    <script>
      // Robust fix for window.fetch being read-only in some environments
      (function() {
        var _fetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() { return _fetch; },
            set: function(v) { _fetch = v; }
          });
        } catch (e) {
          // Fallback if defineProperty fails
          window.fetch = _fetch;
        }
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
